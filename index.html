<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saints Open Classroom Directory</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 0; margin: 0; color: #1a1a1a; line-height: 1.6; }
        
        /* LOGO STYLE */
        .school-logo {
            position: absolute;
            top: 60px; /* Placed below the signup banner */
            left: 20px;
            height: 60px; /* Adjust height as needed */
            width: auto;
            z-index: 10;
        }

        .signup-banner { background: #2c5282; color: white; text-align: center; padding: 12px 20px; font-weight: 600; border-bottom: 3px solid #ebf8ff; }
        .signup-banner a { color: #fff; text-decoration: underline; margin-left: 5px; }
        
        .container { max-width: 1000px; margin: auto; padding: 20px; position: relative; }
        header { text-align: center; margin-bottom: 30px; color: #1a365d; }
        
        /* ADJUST HEADER FOR MOBILE SO LOGO DOESN'T OVERLAP TITLE */
        @media (max-width: 768px) {
            .school-logo { position: static; display: block; margin: 10px auto; height: 50px; }
            header { margin-top: 10px; }
        }

        .section-title { border-bottom: 2px solid #cbd5e0; padding-bottom: 10px; margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .update-tag { font-size: 0.8rem; color: #718096; font-weight: normal; }
        .controls { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .control-group { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; background-color: #fff; }
        
        .btn-reset { background: #e2e8f0; color: #4a5568; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; height: 47px; transition: background 0.2s; }
        .btn-reset:hover { background: #cbd5e0; }
        .btn-show-all { background: #2b6cb0; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; height: 47px; transition: background 0.2s; }
        .btn-show-all:hover { background: #1e4e8c; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 22px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-top: 6px solid #2b6cb0; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: #2b6cb0; font-size: 1.3rem; }
        .meta-item { font-size: 0.9rem; color: #4a5568; margin-bottom: 6px; display: flex; align-items: flex-start; }
        .meta-item strong { min-width: 110px; color: #2d3748; flex-shrink: 0; }
        .synopsis { font-size: 0.95rem; margin: 15px 0; padding: 10px; background: #f8fafc; border-radius: 6px; flex-grow: 1; border-left: 3px solid #e2e8f0; white-space: pre-wrap; }
        .card-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .action-link { display: block; text-align: center; padding: 10px; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.9rem; transition: background 0.3s; }
        .reg-btn { background: #2b6cb0; color: white; }
        .reg-btn:hover { background: #1e4e8c; }
        .fb-btn { background: #edf2f7; color: #2d3748; border: 1px solid #cbd5e0; }
        .fb-btn:hover { background: #e2e8f0; }

        .affirmation-hint { 
            font-family: 'Arial Narrow', Arial, sans-serif; 
            font-size: 0.75rem; 
            color: #718096; 
            text-align: center; 
            margin-top: -5px; 
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="signup-banner">
    ✨ I want to open my classroom! 
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdxOp3sV6D_ZTCWPRbs2QMlnwLebszO3Ivem3mlZ5GP7fW95A/viewform?usp=header" target="_blank">Click here to sign up</a>
</div>

<img src="logo.png" alt="School Logo" class="school-logo">

<div class="container">
    <header><h1>Saints Open Classroom Directory</h1></header>
    
    <div id="upcoming-section">
        <h2 class="section-title">Next 3 Upcoming Sessions <span id="lastUpdated" class="update-tag">Loading...</span></h2>
        <div id="upcoming-results" class="grid"></div>
    </div>

    <h2 class="section-title">Directory Search</h2>
    <div class="controls">
        <div class="control-group">
            <label>Filter by Teacher</label>
            <select id="teacherFilter"><option value="">Select a Teacher...</option></select>
        </div>
        <div class="control-group">
            <label>Filter by Date</label>
            <select id="dateFilter"><option value="">Select a Date...</option></select>
        </div>
        <button class="btn-show-all" onclick="showAllSessions()">Show All Sessions</button>
        <button class="btn-reset" onclick="resetFilters()">Clear</button>
    </div>
    <div id="search-results" class="grid"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlbRM6t__bd0YcFwFIr4yYYw6db87i6Ta9zYZcd_HwGNMj3m2t6P79PY3fTcQXy8_A/exec"; 
    
    let upcomingData = [];
    let masterData = [];

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            upcomingData = data.upcoming || [];
            masterData = data.directory || [];
            updateFilterOptions();
            displayUpcoming();
            handleFilterChange();
            document.getElementById('lastUpdated').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
        } catch (e) { 
            console.error("Data Load Error:", e);
            document.getElementById('upcoming-results').innerHTML = "<p style='color:red;'>Failed to load data.</p>";
        }
    }

    function updateFilterOptions() {
        const tSelect = document.getElementById('teacherFilter');
        const dSelect = document.getElementById('dateFilter');
        const currentT = tSelect.value;
        const currentD = dSelect.value;
        tSelect.innerHTML = '<option value="">Select a Teacher...</option>';
        dSelect.innerHTML = '<option value="">Select a Date...</option>';
        const teachers = [...new Set(masterData.map(item => String(item["name"])))].filter(n => n && n !== "undefined").sort();
        const dates = [...new Set(masterData.map(item => String(item["date"])))].filter(d => d && d !== "undefined").sort(sortDates);
        teachers.forEach(t => tSelect.innerHTML += `<option value="${t}">${t}</option>`);
        dates.forEach(d => dSelect.innerHTML += `<option value="${d}">${d}</option>`);
        tSelect.value = currentT;
        dSelect.value = currentD;
    }

    function sortDates(a, b) { return parseDate(a) - parseDate(b); }

    function parseDate(dateStr) {
        if (!dateStr || dateStr === "undefined") return new Date(0);
        const parts = dateStr.split('/');
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    function displayUpcoming() {
        renderCards(upcomingData.slice(0, 3), 'upcoming-results');
    }

    function handleFilterChange(triggeredByType) {
        const tSelect = document.getElementById('teacherFilter');
        const dSelect = document.getElementById('dateFilter');
        if (triggeredByType === 'teacher' && tSelect.value) dSelect.value = "";
        if (triggeredByType === 'date' && dSelect.value) tSelect.value = "";
        let filtered = (tSelect.value) ? masterData.filter(item => String(item["name"]) === tSelect.value) : (dSelect.value ? masterData.filter(item => String(item["date"]) === dSelect.value) : []);
        renderCards(filtered, 'search-results');
    }

    function showAllSessions() {
        document.getElementById('teacherFilter').value = "";
        document.getElementById('dateFilter').value = "";
        renderCards(masterData, 'search-results');
    }

    function resetFilters() {
        document.getElementById('teacherFilter').value = "";
        document.getElementById('dateFilter').value = "";
        renderCards([], 'search-results');
    }

    function renderCards(data, containerId) {
        const container = document.getElementById(containerId);
        if (!data || data.length === 0) {
            container.innerHTML = containerId === 'search-results' ? "<p>Select a teacher or date to see directory details.</p>" : "<p>No sessions found.</p>";
            return;
        }
        
        container.innerHTML = "";
        data.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            const regUrl = item["register link"];
            const fbUrl = item["feedback link"];

            card.innerHTML = `
                <h3>${item["name"] || 'N/A'}</h3>
                <div class="meta-item"><strong>Date:</strong> ${item["date"] || 'TBC'}</div>
                <div class="meta-item"><strong>Start Time:</strong> ${item["start time"] || 'TBC'}</div>
                <div class="meta-item"><strong>Duration:</strong> ${item["duration"] || ''}</div>
                <div class="meta-item"><strong>TG:</strong> ${item["tg"] || 'N/A'}</div>
                <div class="meta-item"><strong>Attendees:</strong> ${item["attendees"] || '0'}</div>
                <div class="synopsis"><strong>Description:</strong><br>${item["brief description"] || 'No description.'}</div>
                
                <div class="card-actions">
                    ${regUrl ? `<a href="${regUrl}" target="_blank" class="action-link reg-btn">Register for this Open Classroom</a>` : ''}
                    ${fbUrl ? `
                        <a href="${fbUrl}" target="_blank" class="action-link fb-btn">Send Affirmation</a>
                        <div class="affirmation-hint">Your affirmation will go directly to the teacher.</div>
                    ` : ''}
                </div>
            `;
            container.appendChild(card);
        });
    }

    setInterval(fetchData, 300000);
    fetchData();
    document.getElementById('teacherFilter').addEventListener('change', () => handleFilterChange('teacher'));
    document.getElementById('dateFilter').addEventListener('change', () => handleFilterChange('date'));
</script>
</body>
</html>
