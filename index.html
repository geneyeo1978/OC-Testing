<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saints Open Classroom Directory</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 0; margin: 0; color: #1a1a1a; line-height: 1.6; }
        
        /* New Sign-up Banner */
        .signup-banner { background: #2c5282; color: white; text-align: center; padding: 12px 20px; font-weight: 600; border-bottom: 3px solid #ebf8ff; }
        .signup-banner a { color: #fff; text-decoration: underline; margin-left: 5px; transition: color 0.2s; }
        .signup-banner a:hover { color: #bee3f8; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; color: #1a365d; }
        .section-title { border-bottom: 2px solid #cbd5e0; padding-bottom: 10px; margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .update-tag { font-size: 0.8rem; color: #718096; font-weight: normal; }
        
        .controls { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .control-group { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0; background-color: #fff; }
        
        .btn-reset { background: #e2e8f0; color: #4a5568; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; height: 47px; }
        .btn-reset:hover { background: #cbd5e0; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 22px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-top: 6px solid #2b6cb0; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: #2b6cb0; font-size: 1.3rem; }
        
        .meta-item { font-size: 0.9rem; color: #4a5568; margin-bottom: 6px; display: flex; align-items: flex-start; }
        .meta-item strong { min-width: 110px; color: #2d3748; flex-shrink: 0; }
        
        .synopsis { font-size: 0.95rem; margin: 15px 0; padding: 10px; background: #f8fafc; border-radius: 6px; flex-grow: 1; border-left: 3px solid #e2e8f0; white-space: pre-wrap; }
        
        .feedback-link { display: block; text-align: center; background: #2b6cb0; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: 600; margin-top: 10px; transition: background 0.3s; }
        .feedback-link:hover { background: #1e4e8c; }
    </style>
</head>
<body>

<div class="signup-banner">
    ✨ I want to open my classroom! 
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdxOp3sV6D_ZTCWPRbs2QMlnwLebszO3Ivem3mlZ5GP7fW95A/viewform?usp=header" target="_blank">Click here to sign up</a>
</div>

<div class="container">
    <header>
        <h1>Saints Open Classroom Directory</h1>
    </header>

    <div id="upcoming-section">
        <h2 class="section-title">
            Next 3 Upcoming Sessions 
            <span id="lastUpdated" class="update-tag">Loading...</span>
        </h2>
        <div id="upcoming-results" class="grid"></div>
    </div>

    <h2 class="section-title">Search Directory</h2>
    <div class="controls">
        <div class="control-group">
            <label>Filter by Teacher</label>
            <select id="teacherFilter"><option value="">Select a Teacher...</option></select>
        </div>
        <div class="control-group">
            <label>Filter by Date</label>
            <select id="dateFilter"><option value="">Select a Date...</option></select>
        </div>
        <button class="btn-reset" onclick="resetFilters()">Clear Filters</button>
    </div>

    <div id="search-results" class="grid"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyupm0DQU7kUAORAtUIxZiLZmZ-N-0KkUudLosVtW__ILlfdf7327QF-T2KsSg2K-oQ/exec"; 
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfeZJHI8PFcQcWtYfO1mO8aFxd5iyZ3-i9e9eEtr2CVsLbMkA/viewform?usp=sf_link";
    
    let allData = [];

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL);
            allData = await response.json();
            
            updateFilterOptions();
            displayUpcoming();
            handleFilterChange();
            
            const now = new Date();
            document.getElementById('lastUpdated').innerText = `Updated: ${now.toLocaleTimeString()}`;
        } catch (e) {
            console.error("Data Load Error:", e);
        }
    }

    function updateFilterOptions() {
        const tSelect = document.getElementById('teacherFilter');
        const dSelect = document.getElementById('dateFilter');
        const currentT = tSelect.value;
        const currentD = dSelect.value;

        tSelect.innerHTML = '<option value="">Select a Teacher...</option>';
        dSelect.innerHTML = '<option value="">Select a Date...</option>';

        const teachers = [...new Set(allData.map(item => String(item["Full Name"])))].filter(n => n && n !== "undefined").sort();
        const dates = [...new Set(allData.map(item => String(item["Date of Open Classroom"])))].filter(d => d && d !== "undefined").sort(sortDates);

        teachers.forEach(t => tSelect.innerHTML += `<option value="${t}">${t}</option>`);
        dates.forEach(d => dSelect.innerHTML += `<option value="${d}">${d}</option>`);

        tSelect.value = currentT;
        dSelect.value = currentD;
    }

    function sortDates(a, b) {
        return parseDate(a) - parseDate(b);
    }

    function parseDate(dateStr) {
        if (!dateStr || dateStr === "undefined") return new Date(0);
        const parts = dateStr.split('/');
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    function displayUpcoming() {
        const today = new Date(); today.setHours(0,0,0,0);
        const futureOnes = allData
            .filter(item => parseDate(item["Date of Open Classroom"]) >= today)
            .sort((a, b) => parseDate(a["Date of Open Classroom"]) - parseDate(b["Date of Open Classroom"]))
            .slice(0, 3);
        renderCards(futureOnes, 'upcoming-results');
    }

    function handleFilterChange(triggeredByType) {
        const tSelect = document.getElementById('teacherFilter');
        const dSelect = document.getElementById('dateFilter');
        
        if (triggeredByType === 'teacher' && tSelect.value) dSelect.value = "";
        if (triggeredByType === 'date' && dSelect.value) tSelect.value = "";

        let filtered = [];
        if (tSelect.value) {
            filtered = allData.filter(item => String(item["Full Name"]) === tSelect.value);
        } else if (dSelect.value) {
            filtered = allData.filter(item => String(item["Date of Open Classroom"]) === dSelect.value);
        }
        renderCards(filtered, 'search-results');
    }

    function resetFilters() {
        document.getElementById('teacherFilter').value = "";
        document.getElementById('dateFilter').value = "";
        renderCards([], 'search-results');
    }

    function renderCards(data, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = data.length ? "" : (containerId === 'search-results' ? "<p>Please select a teacher or date.</p>" : "<p>No upcoming sessions found.</p>");
        
        data.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <h3>${item["Full Name"] || 'N/A'}</h3>
                <div class="meta-item"><strong>Date:</strong> ${item["Date of Open Classroom"] || 'TBC'}</div>
                <div class="meta-item"><strong>Start Time:</strong> ${item["Start Time of Open Classroom"] || 'Check Sheet'}</div>
                <div class="meta-item"><strong>Duration:</strong> ${item["Duration of Open Classroom"] || ''}</div>
                <div class="meta-item"><strong>Venue:</strong> ${item["Venue of Open Classroom"] || 'TBC'}</div>
                <div class="meta-item"><strong>Subject:</strong> ${item["Subject/Level of Open Classroom"] || 'N/A'}</div>
                
                <div class="synopsis">
                    <strong>Synopsis:</strong><br>
                    ${item["Synopsis of Open Classroom"] || 'No description provided.'}
                </div>

                <a href="${FORM_URL}" target="_blank" class="feedback-link">Click to submit feedback</a>
            `;
            container.appendChild(card);
        });
    }

    setInterval(fetchData, 300000);
    fetchData();
    document.getElementById('teacherFilter').addEventListener('change', () => handleFilterChange('teacher'));
    document.getElementById('dateFilter').addEventListener('change', () => handleFilterChange('date'));
</script>
</body>
</html>
